{{- if .Values.ingressRoute.enabled -}}
{{- $fullName := include "wiki.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $defaultHost := "" -}}
{{- if .Values.ingress.hosts -}}
{{- $defaultHost = (first .Values.ingress.hosts).host -}}
{{- end -}}
{{- $match := .Values.ingressRoute.match | default (printf "Host(`%s`)" $defaultHost) -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "wiki.labels" . | nindent 4 }}
  {{- with .Values.ingressRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: {{ $match }} && PathRegexp(`/(moin_static1911|static|favicon\.ico)`)
      kind: Rule
      {{- with .Values.ingressRoute.staticMiddlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- with .namespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    - match: {{ $match }}
      kind: Rule
      {{- with .Values.ingressRoute.middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- with .namespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
  {{- with .Values.ingressRoute.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
