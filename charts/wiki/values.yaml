# Default values for wiki.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: g10f/wiki
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
args: ""
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

mail_smarthost: localhost
mail_from: ""

storageClass: ""
storageSize: 8Gi
# Existing PVC to clone from
dataSourceName: ""

# Configuration for secrets that should be created
secrets: {}
  # mysecret:
  #   type: {}
  #   annotations: {}
  #   labels: {}
  #   stringData: {}
  #   data: {}

# Additional environment variables for the wiki
extraEnv: ""
  # - name: WIKI_MAIL_FROM
  #   value: wiki@example.com

# Additional environment variables for the wiki mapped from Secret or ConfigMap
extraEnvFrom: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

middlewares: []
# - name: my-redirect-https
#   spec:
#     redirectScheme:
#       scheme: https
#       permanent: true

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: "wiki.example.com"
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Traefik IngressRoute (alternative to ingress above).
# match defaults to Host(`<ingress.hosts[0].host>`) if not set.
# The static route (moin_static1911, static, favicon.ico) is rendered as a
# separate higher-priority route. Use staticMiddlewares to attach middleware
# only to those paths (e.g. cache-control headers).
ingressRoute:
  enabled: false
  entryPoints:
    - websecure
  match: ""
  middlewares: []
  staticMiddlewares: []
  tls: {}
  # secretName: my-tls-secret
  # certResolver: letsencrypt
  annotations: {}

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

jobs: []

# Nginx sidecar container — enabled automatically when ingressRoute.enabled is true.
# Acts as a reverse proxy in front of the Django/gunicorn container so that
# nginx-specific behaviour (body size limits, header manipulation, etc.) can be
# configured without relying on ingress-nginx annotations.
nginx:
  image:
    repository: public.ecr.aws/nginx/nginx
    tag: 1.28-alpine
    pullPolicy: IfNotPresent
  # Full contents of /etc/nginx/conf.d/default.conf inside the sidecar.
  config: |
    server {
        listen 80;
        client_max_body_size 20m;
        server_tokens off;

        add_header X-XSS-Protection "1" always;

        # Capture the wiki name (first path segment) and pass it as SCRIPT_NAME
        # so moin wiki knows its own base URL (e.g. /general, /centerbs, …).
        # Mirrors the nginx-ingress configuration-snippet:
        #   proxy_set_header SCRIPT_NAME /$1;
        location ~ ^/(?!static|moin_static1911|favicon\.ico)([^/]+) {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header SCRIPT_NAME /$1;
        }

        location ~ ^/$ {
            return 301 https://$server_name/general/;
        }

        location / {
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
  resources: {}
