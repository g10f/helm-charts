{{- if .Values.ingressRoute.enabled -}}
{{- $fullName := include "sso.fullname" . -}}
{{- $match := .Values.ingressRoute.match | default (printf "Host(`%s`)" .Values.domain) -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "sso.labels" . | nindent 4 }}
  {{- with .Values.ingressRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: {{ $match }}
      kind: Rule
      {{- with .Values.ingressRoute.middlewares }}
      middlewares:
        {{- range . }}
        - name: {{ .name }}
          {{- with .namespace }}
          namespace: {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ $fullName }}-backend
          port: 80
  {{- with .Values.ingressRoute.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
